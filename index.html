<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Metal Welding Simulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    overflow: hidden;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    width: 100vw;
  }

  #ui-overlay {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
    pointer-events: none;
  }

  .title-block {
    display: flex; align-items: center; gap: 12px;
  }

  .title-block h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 900;
    color: #ff6a00;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(255,106,0,0.5);
  }

  .weld-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, #ff6a00 40%, #ff2200 100%);
    box-shadow: 0 0 15px rgba(255,106,0,0.8), 0 0 30px rgba(255,34,0,0.4);
    animation: pulse-icon 1.5s ease-in-out infinite;
  }

  @keyframes pulse-icon {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.15); opacity: 0.8; }
  }

  .stats {
    display: flex; gap: 32px; align-items: center;
  }

  .stat {
    text-align: center;
  }

  .stat-label {
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 2px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: bold;
    color: #ff6a00;
    text-shadow: 0 0 15px rgba(255,106,0,0.6);
  }

  #canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    cursor: crosshair;
  }

  .hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    color: #555;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 0.8s;
  }

  #reset-btn {
    position: fixed;
    bottom: 18px;
    right: 20px;
    z-index: 10;
    background: rgba(255,106,0,0.15);
    border: 1px solid rgba(255,106,0,0.4);
    color: #ff6a00;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 8px 18px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }

  #reset-btn:hover, #reset-btn:active {
    background: rgba(255,106,0,0.3);
    box-shadow: 0 0 20px rgba(255,106,0,0.3);
  }
</style>
</head>
<body>

<div id="ui-overlay">
  <div class="title-block">
    <div class="weld-icon"></div>
    <h1>Weld Sim</h1>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Coverage</div>
      <div class="stat-value" id="coverage">0%</div>
    </div>
    <div class="stat">
      <div class="stat-label">Accuracy</div>
      <div class="stat-value" id="accuracy">0%</div>
    </div>
    <div class="stat">
      <div class="stat-label">Status</div>
      <div class="stat-value" id="status">READY</div>
    </div>
  </div>
</div>

<div class="hint" id="hint">Touch &amp; drag along the crack to weld</div>
<button id="reset-btn">Reset</button>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const coverageEl = document.getElementById('coverage');
const accuracyEl = document.getElementById('accuracy');
const statusEl = document.getElementById('status');
const hintEl = document.getElementById('hint');

let W, H, dpr;
let isWelding = false;
let lastX = 0, lastY = 0;
let crackPoints = [];
let crackSegmentsWelded = [];
let sparks = [];
let totalCoverage = 0;
let totalWeldPoints = 0;
let onCrackWeldPoints = 0;

// Offscreen canvases — baked layers that don't re-render every frame
let metalGrainCanvas, metalGrainCtx;
let weldLayerCanvas, weldLayerCtx;      // cooled beads baked here
let heatLayerCanvas, heatLayerCtx;      // heat zones drawn here, fades over time

// Active (hot) beads still animating their cooling — once cooled they get baked
let activeBeads = [];

// Particle caps
const MAX_SPARKS = 120;
const BEAD_COOL_FRAMES = 90; // frames until a bead is considered cooled and baked

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  generateMetalGrain();
  initOffscreenLayers();
  generateCrack();
}

function initOffscreenLayers() {
  weldLayerCanvas = document.createElement('canvas');
  weldLayerCanvas.width = W * dpr;
  weldLayerCanvas.height = H * dpr;
  weldLayerCtx = weldLayerCanvas.getContext('2d');
  weldLayerCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  heatLayerCanvas = document.createElement('canvas');
  heatLayerCanvas.width = W * dpr;
  heatLayerCanvas.height = H * dpr;
  heatLayerCtx = heatLayerCanvas.getContext('2d');
  heatLayerCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function generateMetalGrain() {
  metalGrainCanvas = document.createElement('canvas');
  metalGrainCanvas.width = W;
  metalGrainCanvas.height = H;
  metalGrainCtx = metalGrainCanvas.getContext('2d');

  const grad = metalGrainCtx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, '#a8adb5');
  grad.addColorStop(0.3, '#b5bac2');
  grad.addColorStop(0.5, '#a0a5ad');
  grad.addColorStop(0.7, '#adb2ba');
  grad.addColorStop(1, '#9ea3ab');
  metalGrainCtx.fillStyle = grad;
  metalGrainCtx.fillRect(0, 0, W, H);

  metalGrainCtx.globalAlpha = 0.12;
  for (let i = 0; i < H; i += 2) {
    const brightness = Math.random() * 30 - 15;
    metalGrainCtx.strokeStyle = brightness > 0
      ? `rgba(255,255,255,${Math.random() * 0.15})`
      : `rgba(0,0,0,${Math.random() * 0.1})`;
    metalGrainCtx.lineWidth = Math.random() * 1.5;
    metalGrainCtx.beginPath();
    metalGrainCtx.moveTo(0, i + Math.random() * 2);
    metalGrainCtx.lineTo(W, i + Math.random() * 2);
    metalGrainCtx.stroke();
  }
  metalGrainCtx.globalAlpha = 1.0;

  metalGrainCtx.globalAlpha = 0.04;
  for (let i = 0; i < 40; i++) {
    const sx = Math.random() * W;
    const sy = Math.random() * H;
    const ex = sx + (Math.random() - 0.5) * 200;
    const ey = sy + (Math.random() - 0.5) * 40;
    metalGrainCtx.strokeStyle = '#fff';
    metalGrainCtx.lineWidth = 0.5;
    metalGrainCtx.beginPath();
    metalGrainCtx.moveTo(sx, sy);
    metalGrainCtx.lineTo(ex, ey);
    metalGrainCtx.stroke();
  }
  metalGrainCtx.globalAlpha = 1.0;
}

function generateCrack() {
  crackPoints = [];
  crackSegmentsWelded = [];
  activeBeads = [];
  sparks = [];
  totalCoverage = 0;
  totalWeldPoints = 0;
  onCrackWeldPoints = 0;

  // Clear offscreen layers
  if (weldLayerCtx) {
    weldLayerCtx.clearRect(0, 0, W, H);
  }
  if (heatLayerCtx) {
    heatLayerCtx.clearRect(0, 0, W, H);
  }

  const margin = 80;
  const startX = margin + Math.random() * 60;
  const startY = H * 0.3 + Math.random() * (H * 0.4);
  const endX = W - margin - Math.random() * 60;
  const endY = H * 0.3 + Math.random() * (H * 0.4);

  const segments = 60;
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const baseX = startX + (endX - startX) * t;
    const baseY = startY + (endY - startY) * t;
    const wander = Math.sin(t * Math.PI * 3.5) * 35
      + Math.sin(t * Math.PI * 7) * 15
      + Math.sin(t * Math.PI * 13) * 8
      + (Math.random() - 0.5) * 20;

    crackPoints.push({
      x: baseX,
      y: baseY + wander,
      width: 2 + Math.random() * 3 + Math.sin(t * Math.PI) * 2
    });
    crackSegmentsWelded.push(0);
  }
}

function drawMetal() {
  ctx.drawImage(metalGrainCanvas, 0, 0);
}

// Fade the heat layer each frame instead of tracking individual heat particles
let heatFadeCounter = 0;
function updateHeatLayer() {
  heatFadeCounter++;
  if (heatFadeCounter % 3 === 0) {
    // Gradually fade the heat layer by drawing a semi-transparent black rect
    heatLayerCtx.globalCompositeOperation = 'destination-out';
    heatLayerCtx.fillStyle = 'rgba(0,0,0,0.02)';
    heatLayerCtx.fillRect(0, 0, W, H);
    heatLayerCtx.globalCompositeOperation = 'source-over';
  }
}

function addHeat(x, y) {
  const radius = 25 + Math.random() * 15;
  const grad = heatLayerCtx.createRadialGradient(x, y, 0, x, y, radius);
  grad.addColorStop(0, 'rgba(120,60,20,0.12)');
  grad.addColorStop(0.5, 'rgba(80,40,15,0.07)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  heatLayerCtx.fillStyle = grad;
  heatLayerCtx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
}

function drawCrack() {
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  for (let i = 0; i < crackPoints.length - 1; i++) {
    if (crackSegmentsWelded[i] > 0.8) continue;

    const p1 = crackPoints[i];
    const p2 = crackPoints[i + 1];
    const alpha = 1 - crackSegmentsWelded[i];

    ctx.strokeStyle = `rgba(0,0,0,${0.9 * alpha})`;
    ctx.lineWidth = p1.width + 4;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y + 1);
    ctx.lineTo(p2.x, p2.y + 1);
    ctx.stroke();

    ctx.strokeStyle = `rgba(10,8,6,${alpha})`;
    ctx.lineWidth = p1.width;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();

    ctx.strokeStyle = `rgba(80,75,70,${0.4 * alpha})`;
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y - p1.width / 2);
    ctx.lineTo(p2.x, p2.y - p2.width / 2);
    ctx.stroke();

    ctx.strokeStyle = `rgba(30,28,25,${0.5 * alpha})`;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y + p1.width / 2);
    ctx.lineTo(p2.x, p2.y + p2.width / 2);
    ctx.stroke();

    if (i % 5 === 0 && alpha > 0.5) {
      const angle = (Math.random() - 0.5) * 1.2 + (Math.random() > 0.5 ? -1 : 1) * 0.8;
      const len = 8 + Math.random() * 18;
      ctx.strokeStyle = `rgba(10,8,6,${0.3 * alpha})`;
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p1.x + Math.cos(angle) * len, p1.y + Math.sin(angle) * len);
      ctx.stroke();
    }
  }
}

// Bake a single cooled bead onto the offscreen weld layer
function bakeBead(bead) {
  const c = weldLayerCtx;
  const bodyGrad = c.createRadialGradient(
    bead.x, bead.y - 1, 0,
    bead.x, bead.y, bead.size + 2
  );
  bodyGrad.addColorStop(0, 'rgba(150,148,142,0.85)');
  bodyGrad.addColorStop(0.5, 'rgba(120,118,112,0.8)');
  bodyGrad.addColorStop(1, 'rgba(80,78,72,0.3)');
  c.fillStyle = bodyGrad;
  c.beginPath();
  c.ellipse(bead.x, bead.y, bead.size + 1, bead.size * 0.7, bead.angle || 0, 0, Math.PI * 2);
  c.fill();

  // Ripple texture
  c.strokeStyle = 'rgba(180,178,170,0.15)';
  c.lineWidth = 0.5;
  c.beginPath();
  c.arc(bead.x, bead.y - 0.5, bead.size * 0.5, 0, Math.PI, true);
  c.stroke();
}

// Draw only the active (still-hot) beads on the main canvas
function drawActiveBeads() {
  for (let i = activeBeads.length - 1; i >= 0; i--) {
    const bead = activeBeads[i];
    bead.age++;
    const cooling = bead.age / BEAD_COOL_FRAMES;

    if (cooling >= 1) {
      // Bead is cooled — bake it onto the offscreen layer and remove
      bakeBead(bead);
      activeBeads.splice(i, 1);
      continue;
    }

    const bodyGrad = ctx.createRadialGradient(
      bead.x, bead.y - 1, 0,
      bead.x, bead.y, bead.size + 2
    );

    if (cooling < 0.35) {
      bodyGrad.addColorStop(0, `rgba(255,240,180,${0.9 - cooling})`);
      bodyGrad.addColorStop(0.4, `rgba(255,160,40,${0.8 - cooling})`);
      bodyGrad.addColorStop(0.8, 'rgba(180,80,20,0.6)');
      bodyGrad.addColorStop(1, 'rgba(80,50,30,0.3)');
    } else {
      bodyGrad.addColorStop(0, 'rgba(160,100,60,0.8)');
      bodyGrad.addColorStop(0.5, 'rgba(100,70,50,0.7)');
      bodyGrad.addColorStop(1, 'rgba(60,50,40,0.3)');
    }

    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(bead.x, bead.y, bead.size + 1, bead.size * 0.7, bead.angle || 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawArc(x, y) {
  const arcGrad = ctx.createRadialGradient(x, y, 0, x, y, 60);
  arcGrad.addColorStop(0, 'rgba(255,255,255,0.95)');
  arcGrad.addColorStop(0.05, 'rgba(200,220,255,0.9)');
  arcGrad.addColorStop(0.15, 'rgba(100,160,255,0.6)');
  arcGrad.addColorStop(0.35, 'rgba(255,140,40,0.3)');
  arcGrad.addColorStop(0.6, 'rgba(255,60,10,0.1)');
  arcGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = arcGrad;
  ctx.fillRect(x - 60, y - 60, 120, 120);

  const flicker = 0.7 + Math.random() * 0.3;
  const outerGrad = ctx.createRadialGradient(x, y, 0, x, y, 120);
  outerGrad.addColorStop(0, `rgba(255,200,100,${0.3 * flicker})`);
  outerGrad.addColorStop(0.3, `rgba(255,120,20,${0.15 * flicker})`);
  outerGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = outerGrad;
  ctx.fillRect(x - 120, y - 120, 240, 240);

  ctx.fillStyle = `rgba(255,255,255,${0.8 + Math.random() * 0.2})`;
  ctx.beginPath();
  ctx.arc(x, y, 3 + Math.random() * 2, 0, Math.PI * 2);
  ctx.fill();
}

function spawnSparks(x, y) {
  // Reduced count: 2-4 sparks instead of 3-8
  const count = 2 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    if (sparks.length >= MAX_SPARKS) break;
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    sparks.push({
      x, y,
      vx: Math.cos(angle) * speed + (Math.random() - 0.5) * 2,
      vy: Math.sin(angle) * speed - Math.random() * 3,
      life: 1,
      decay: 0.03 + Math.random() * 0.05,  // faster decay
      size: 0.5 + Math.random() * 1.8,
      bright: Math.random() > 0.5
    });
  }
}

function updateAndDrawSparks() {
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx;
    s.y += s.vy;
    s.vy += 0.15;
    s.life -= s.decay;

    if (s.life <= 0) { sparks.splice(i, 1); continue; }

    const g = s.bright ? 220 + s.life * 35 : 140 + s.life * 60;
    const b = s.bright ? 150 * s.life : 20;
    ctx.fillStyle = `rgba(255,${g|0},${b|0},${s.life})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
    ctx.fill();

    if (s.life > 0.4) {
      ctx.strokeStyle = `rgba(255,${g|0},${b|0},${s.life * 0.3})`;
      ctx.lineWidth = s.size * 0.5;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - s.vx * 2, s.y - s.vy * 2);
      ctx.stroke();
    }
  }
}

function weldAtPoint(x, y) {
  const weldRadius = 18;
  let minDist = Infinity;
  let closestCrackWidth = 4;

  for (let i = 0; i < crackPoints.length; i++) {
    const cp = crackPoints[i];
    const dx = x - cp.x;
    const dy = y - cp.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < minDist) {
      minDist = dist;
      closestCrackWidth = cp.width;
    }

    if (dist < weldRadius) {
      const strength = 1 - (dist / weldRadius);
      crackSegmentsWelded[i] = Math.min(1, crackSegmentsWelded[i] + strength * 0.15);
    }
  }

  totalWeldPoints++;
  const accuracyThreshold = closestCrackWidth + 6;
  if (minDist <= accuracyThreshold) {
    onCrackWeldPoints++;
  }

  // Add active bead (will animate then bake)
  activeBeads.push({
    x: x + (Math.random() - 0.5) * 4,
    y: y + (Math.random() - 0.5) * 4,
    size: 4 + Math.random() * 4,
    age: 0,
    angle: Math.atan2(y - lastY, x - lastX)
  });

  addHeat(x, y);
  spawnSparks(x, y);
  updateCoverage();
}

function updateCoverage() {
  let welded = 0;
  for (const w of crackSegmentsWelded) {
    if (w > 0.6) welded++;
  }
  totalCoverage = Math.round((welded / crackSegmentsWelded.length) * 100);
  coverageEl.textContent = totalCoverage + '%';

  const accuracy = totalWeldPoints > 0
    ? Math.round((onCrackWeldPoints / totalWeldPoints) * 100)
    : 0;
  accuracyEl.textContent = accuracy + '%';

  if (accuracy >= 80) {
    accuracyEl.style.color = '#4cff4c';
  } else if (accuracy >= 50) {
    accuracyEl.style.color = '#ffcc00';
  } else if (accuracy > 0) {
    accuracyEl.style.color = '#ff4444';
  }

  if (totalCoverage >= 100) {
    statusEl.textContent = 'COMPLETE';
    statusEl.style.color = '#4cff4c';
  } else if (totalCoverage > 0) {
    statusEl.textContent = 'WELDING';
    statusEl.style.color = '#ff6a00';
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // 1. Metal background (static image)
  drawMetal();

  // 2. Heat layer (offscreen canvas, fading)
  updateHeatLayer();
  ctx.drawImage(heatLayerCanvas, 0, 0, W * dpr, H * dpr, 0, 0, W, H);

  // 3. Baked (cooled) weld beads (offscreen canvas — no per-bead cost)
  ctx.drawImage(weldLayerCanvas, 0, 0, W * dpr, H * dpr, 0, 0, W, H);

  // 4. Crack (only unwelded segments)
  drawCrack();

  // 5. Active (hot) beads — small number, still animating
  drawActiveBeads();

  // 6. Arc glow at cursor
  if (isWelding) {
    drawArc(lastX, lastY);
  }

  // 7. Sparks (capped)
  updateAndDrawSparks();

  // 8. Screen flash
  if (isWelding) {
    ctx.fillStyle = `rgba(200,220,255,${0.02 + Math.random() * 0.03})`;
    ctx.fillRect(0, 0, W, H);
  }

  requestAnimationFrame(draw);
}

// --- Input handling ---

function getPos(e) {
  if (e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}

function startWeld(e) {
  e.preventDefault();
  isWelding = true;
  const pos = getPos(e);
  lastX = pos.x;
  lastY = pos.y;
  hintEl.style.opacity = '0';
}

function moveWeld(e) {
  e.preventDefault();
  if (!isWelding) return;
  const pos = getPos(e);
  const dx = pos.x - lastX;
  const dy = pos.y - lastY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  const steps = Math.max(1, Math.floor(dist / 4)); // slightly larger step size
  for (let s = 0; s < steps; s++) {
    const t = s / steps;
    const wx = lastX + dx * t;
    const wy = lastY + dy * t;
    weldAtPoint(wx, wy);
  }

  lastX = pos.x;
  lastY = pos.y;
}

function stopWeld(e) {
  if (e) e.preventDefault();
  isWelding = false;
}

canvas.addEventListener('mousedown', startWeld);
canvas.addEventListener('mousemove', moveWeld);
canvas.addEventListener('mouseup', stopWeld);
canvas.addEventListener('mouseleave', stopWeld);

canvas.addEventListener('touchstart', startWeld, { passive: false });
canvas.addEventListener('touchmove', moveWeld, { passive: false });
canvas.addEventListener('touchend', stopWeld, { passive: false });
canvas.addEventListener('touchcancel', stopWeld, { passive: false });

document.getElementById('reset-btn').addEventListener('click', () => {
  generateCrack();
  coverageEl.textContent = '0%';
  accuracyEl.textContent = '0%';
  accuracyEl.style.color = '#ff6a00';
  statusEl.textContent = 'READY';
  statusEl.style.color = '#ff6a00';
  hintEl.style.opacity = '1';
});

window.addEventListener('resize', resize);

resize();
draw();
</script>
</body>
</html>
